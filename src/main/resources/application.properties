spring.application.name=fitforge

# H2 in-memory database - good for dev + grading; swap for a real DB later.
spring.datasource.url=jdbc:h2:mem:fitforge;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console (optional, nice for demos): http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable open-session-in-view to silence the Spring startup warning
# (and avoid subtle lazy-load-in-view issues).
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false
